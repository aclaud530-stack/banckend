version: '3.8'

services:
  # API Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deriv-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      HOST: 0.0.0.0
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - .env.development
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - deriv-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Redis para pub/sub e caching
  redis:
    image: redis:7-alpine
    container_name: deriv-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - deriv-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # PostgreSQL para dados (opcional)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: deriv-postgres
  #   environment:
  #     POSTGRES_DB: deriv_trading
  #     POSTGRES_USER: deriv_user
  #     POSTGRES_PASSWORD: change_me_in_production
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - deriv-network
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U deriv_user"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 3

volumes:
  redis-data:
  # postgres-data:

networks:
  deriv-network:
    driver: bridge
